apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hookah-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: hookah/auth-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: hookah-platform-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: hookah-platform
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080
---
