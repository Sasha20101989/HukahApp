services:
  api-gateway:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/api-gateway/src/HookahPlatform.ApiGateway/HookahPlatform.ApiGateway.csproj
    command: ["HookahPlatform.ApiGateway.dll"]
    ports:
      - "8080:8080"
    environment:
      Jwt__Issuer: hookah-platform
      Jwt__Audience: hookah-platform-clients
      Jwt__Secret: change-this-secret-before-production-change-this-secret
    depends_on:
      - auth-service
      - user-service
      - branch-service
      - mixology-service
      - inventory-service
      - order-service
      - booking-service
      - payment-service
      - notification-service
      - analytics-service
      - review-service
      - promo-service

  auth-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/auth-service/src/HookahPlatform.AuthService/HookahPlatform.AuthService.csproj
    command: ["HookahPlatform.AuthService.dll"]
    environment:
      Jwt__Issuer: hookah-platform
      Jwt__Audience: hookah-platform-clients
      Jwt__Secret: change-this-secret-before-production-change-this-secret

  user-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/user-service/src/HookahPlatform.UserService/HookahPlatform.UserService.csproj
    command: ["HookahPlatform.UserService.dll"]

  branch-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/branch-service/src/HookahPlatform.BranchService/HookahPlatform.BranchService.csproj
    command: ["HookahPlatform.BranchService.dll"]

  mixology-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/mixology-service/src/HookahPlatform.MixologyService/HookahPlatform.MixologyService.csproj
    command: ["HookahPlatform.MixologyService.dll"]
    environment:
      Services__inventory-service__BaseUrl: http://inventory-service:8080

  inventory-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/inventory-service/src/HookahPlatform.InventoryService/HookahPlatform.InventoryService.csproj
    command: ["HookahPlatform.InventoryService.dll"]

  order-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/order-service/src/HookahPlatform.OrderService/HookahPlatform.OrderService.csproj
    command: ["HookahPlatform.OrderService.dll"]
    environment:
      Services__mixology-service__BaseUrl: http://mixology-service:8080
      Services__inventory-service__BaseUrl: http://inventory-service:8080
      Services__branch-service__BaseUrl: http://branch-service:8080

  booking-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/booking-service/src/HookahPlatform.BookingService/HookahPlatform.BookingService.csproj
    command: ["HookahPlatform.BookingService.dll"]

  payment-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/payment-service/src/HookahPlatform.PaymentService/HookahPlatform.PaymentService.csproj
    command: ["HookahPlatform.PaymentService.dll"]
    environment:
      Services__booking-service__BaseUrl: http://booking-service:8080

  notification-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/notification-service/src/HookahPlatform.NotificationService/HookahPlatform.NotificationService.csproj
    command: ["HookahPlatform.NotificationService.dll"]

  analytics-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/analytics-service/src/HookahPlatform.AnalyticsService/HookahPlatform.AnalyticsService.csproj
    command: ["HookahPlatform.AnalyticsService.dll"]

  review-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/review-service/src/HookahPlatform.ReviewService/HookahPlatform.ReviewService.csproj
    command: ["HookahPlatform.ReviewService.dll"]

  promo-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/promo-service/src/HookahPlatform.PromoService/HookahPlatform.PromoService.csproj
    command: ["HookahPlatform.PromoService.dll"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hookah
      POSTGRES_USER: hookah
      POSTGRES_PASSWORD: hookah
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
