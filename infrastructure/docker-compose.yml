x-service-events: &service-events
  ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=hookah;Username=hookah;Password=hookah
  Services__analytics-service__BaseUrl: http://analytics-service:8080
  Services__notification-service__BaseUrl: http://notification-service:8080
  RabbitMQ__Enabled: "true"
  RabbitMQ__HostName: rabbitmq
  RabbitMQ__Port: "5672"
  RabbitMQ__UserName: guest
  RabbitMQ__Password: guest
  RabbitMQ__VirtualHost: /
  RabbitMQ__Exchange: hookah.platform.events
  Redis__Enabled: "true"
  ConnectionStrings__Redis: redis:6379
  Security__GatewaySecret: local-gateway-secret-change-me
  Security__InternalServiceSecret: local-service-secret-change-me
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - crm-app
      - client-app

  crm-app:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        APP_PATH: frontend/crm-app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  client-app:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        APP_PATH: frontend/client-app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/api-gateway/src/HookahPlatform.ApiGateway/HookahPlatform.ApiGateway.csproj
    command: ["HookahPlatform.ApiGateway.dll"]
    ports:
      - "8080:8080"
    environment:
      Jwt__Issuer: hookah-platform
      Jwt__Audience: hookah-platform-clients
      Jwt__Secret: change-this-secret-before-production-change-this-secret
      Security__GatewaySecret: local-gateway-secret-change-me
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      - tenant-service
      - auth-service
      - user-service
      - branch-service
      - mixology-service
      - inventory-service
      - order-service
      - booking-service
      - payment-service
      - notification-service
      - analytics-service
      - review-service
      - promo-service

  tenant-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/tenant-service/src/HookahPlatform.TenantService/HookahPlatform.TenantService.csproj
    command: ["HookahPlatform.TenantService.dll"]
    environment:
      <<: *service-events
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  auth-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/auth-service/src/HookahPlatform.AuthService/HookahPlatform.AuthService.csproj
    command: ["HookahPlatform.AuthService.dll"]
    environment:
      <<: *service-events
      Jwt__Issuer: hookah-platform
      Jwt__Audience: hookah-platform-clients
      Jwt__Secret: change-this-secret-before-production-change-this-secret
      Services__user-service__BaseUrl: http://user-service:8080
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  user-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/user-service/src/HookahPlatform.UserService/HookahPlatform.UserService.csproj
    command: ["HookahPlatform.UserService.dll"]
    environment:
      <<: *service-events
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  branch-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/branch-service/src/HookahPlatform.BranchService/HookahPlatform.BranchService.csproj
    command: ["HookahPlatform.BranchService.dll"]
    environment:
      <<: *service-events
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  mixology-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/mixology-service/src/HookahPlatform.MixologyService/HookahPlatform.MixologyService.csproj
    command: ["HookahPlatform.MixologyService.dll"]
    environment:
      <<: *service-events
      Services__inventory-service__BaseUrl: http://inventory-service:8080
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  inventory-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/inventory-service/src/HookahPlatform.InventoryService/HookahPlatform.InventoryService.csproj
    command: ["HookahPlatform.InventoryService.dll"]
    environment:
      <<: *service-events
      Services__mixology-service__BaseUrl: http://mixology-service:8080
      RabbitMQ__Consumers__Enabled: "true"
      RabbitMQ__Consumers__InventoryQueue: inventory.order-served
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started
      mixology-service:
        condition: service_started

  order-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/order-service/src/HookahPlatform.OrderService/HookahPlatform.OrderService.csproj
    command: ["HookahPlatform.OrderService.dll"]
    environment:
      <<: *service-events
      Services__mixology-service__BaseUrl: http://mixology-service:8080
      Services__inventory-service__BaseUrl: http://inventory-service:8080
      Services__branch-service__BaseUrl: http://branch-service:8080
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  booking-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/booking-service/src/HookahPlatform.BookingService/HookahPlatform.BookingService.csproj
    command: ["HookahPlatform.BookingService.dll"]
    environment:
      <<: *service-events
      Services__user-service__BaseUrl: http://user-service:8080
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  payment-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/payment-service/src/HookahPlatform.PaymentService/HookahPlatform.PaymentService.csproj
    command: ["HookahPlatform.PaymentService.dll"]
    environment:
      <<: *service-events
      Services__booking-service__BaseUrl: http://booking-service:8080
      Services__order-service__BaseUrl: http://order-service:8080
      Services__promo-service__BaseUrl: http://promo-service:8080
      Payments__YooKassa__WebhookSecret: local-yookassa-webhook-secret
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  notification-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/notification-service/src/HookahPlatform.NotificationService/HookahPlatform.NotificationService.csproj
    command: ["HookahPlatform.NotificationService.dll"]
    environment:
      <<: *service-events
      Services__user-service__BaseUrl: http://user-service:8080
      Services__booking-service__BaseUrl: http://booking-service:8080
      Services__payment-service__BaseUrl: http://payment-service:8080
      Services__order-service__BaseUrl: http://order-service:8080
      RabbitMQ__Consumers__Enabled: "true"
      RabbitMQ__Consumers__NotificationQueue: notification.events
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started

  analytics-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/analytics-service/src/HookahPlatform.AnalyticsService/HookahPlatform.AnalyticsService.csproj
    command: ["HookahPlatform.AnalyticsService.dll"]
    environment:
      <<: *service-events
      Outbox__Dispatcher__Enabled: "true"
      Outbox__Dispatcher__BatchSize: "50"
      Outbox__Dispatcher__IntervalSeconds: "10"
      RabbitMQ__Consumers__Enabled: "true"
      RabbitMQ__Consumers__AnalyticsQueue: analytics.events
    depends_on:
      db-migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_started

  review-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/review-service/src/HookahPlatform.ReviewService/HookahPlatform.ReviewService.csproj
    command: ["HookahPlatform.ReviewService.dll"]
    environment:
      <<: *service-events
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  promo-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: services/promo-service/src/HookahPlatform.PromoService/HookahPlatform.PromoService.csproj
    command: ["HookahPlatform.PromoService.dll"]
    environment:
      <<: *service-events
    depends_on:
      db-migrator:
        condition: service_completed_successfully

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hookah
      POSTGRES_USER: hookah
      POSTGRES_PASSWORD: hookah
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hookah -d hookah"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrator:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        PROJECT_PATH: infrastructure/migrations/src/HookahPlatform.Migrations/HookahPlatform.Migrations.csproj
    command: ["HookahPlatform.Migrations.dll"]
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=hookah;Username=hookah;Password=hookah
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
