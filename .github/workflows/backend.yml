name: Backend

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore backend/HookahPlatform.sln

      - name: Build
        run: dotnet build backend/HookahPlatform.sln --no-restore -m:1 /nr:false

      - name: Test
        run: dotnet test backend/HookahPlatform.sln --no-build
