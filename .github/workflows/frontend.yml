name: Frontend

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Build frontend
        run: corepack pnpm frontend:build

      - name: Start frontend apps
        run: |
          corepack pnpm --dir frontend/crm-app start > /tmp/hookah-crm.log 2>&1 &
          corepack pnpm --dir frontend/client-app start > /tmp/hookah-client.log 2>&1 &
          sleep 10

      - name: Frontend smoke
        run: corepack pnpm frontend:smoke
